geometry:
  function space: StructuredColumns
  grid:
    type: regional
    nx: 35
    ny: 53
    dx: 5.0e3
    dy: 5.0e3
    lonlat(centre): [9.9, 56.3]
    projection:
      type: lambert_conformal_conic
      latitude0: 56.3
      longitude0: 0.0
    y_numbering: 1
  partitioner: checkerboard
  groups:
  - variables: [air_temperature]
    levels: 2
  halo: 2
background:
  states:
  - date: 2010-01-01T00:00:00Z
    state variables: [air_temperature]
    filepath: testdata/truth__MPI__PT0S
  - date: 2010-01-01T03:00:00Z
    state variables: [air_temperature]
    filepath: testdata/truth__MPI__PT3H
  - date: 2010-01-01T06:00:00Z
    state variables: [air_temperature]
    filepath: testdata/truth__MPI__PT6H
background error:
  covariance model: SABER
  saber central block:
    saber block name: BUMP_NICAS
    calibration:
      drivers:
        multivariate strategy: univariate
        compute nicas: true
      nicas:
        resolution: 4.0
        explicit length-scales: true
        horizontal length-scale:
        - groups: [air_temperature]
          value: 3.0e4
        vertical length-scale:
        - groups: [air_temperature]
          value: 3.0
  saber outer blocks:
  - saber block name: StdDev
    read:
      model file:
        filepath: testdata/stddev__MPI_
  randomization size: 1
output states:
  states:
  - date: 2010-01-01T00:00:00Z
    filepath: testdata/bkg__MPI__PT0S
  - date: 2010-01-01T03:00:00Z
    filepath: testdata/bkg__MPI__PT3H
  - date: 2010-01-01T06:00:00Z
    filepath: testdata/bkg__MPI__PT6H
test:
  reference filename: testref/background.ref
