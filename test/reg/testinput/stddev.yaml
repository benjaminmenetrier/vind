input geometry: &geom
  function space: StructuredColumns
  grid:
    type: regional
    nx: 35
    ny: 53
    dx: 5.0e3
    dy: 5.0e3
    lonlat(centre): [9.9, 56.3]
    projection:
      type: lambert_conformal_conic
      latitude0: 56.3
      longitude0: 0.0
    y_numbering: 1
  partitioner: checkerboard
  groups:
  - variables: [air_temperature]
    levels: 2
  halo: 2
output geometry: *geom
states:
- input:
    date: 2010-01-01T00:00:00Z
    state variables: [air_temperature]
    constant value: 0.1
  output:
    date: 2010-01-01T00:00:00Z
    filepath: testdata/stddev__MPI_
test:
  reference filename: testref/stddev.ref
