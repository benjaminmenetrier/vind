cost function:
  cost type: 3D-Var
  time window:
    begin: 2010-01-01T02:59:59Z
    length: PT2S
  analysis variables: [air_temperature]
  geometry: &geom
    function space: StructuredColumns
    grid:
      type: regional
      nx: 35
      ny: 53
      dx: 5.0e3
      dy: 5.0e3
      lonlat(centre): [9.9, 56.3]
      projection:
        type: lambert_conformal_conic
        latitude0: 56.3
        longitude0: 0.0
      y_numbering: 1
    partitioner: checkerboard
    groups:
    - variables: [air_temperature]
      levels: 2
      vertical coordinate:
        profile: &vert_coord [1,2]
    halo: 2
  background:
    date: 2010-01-01T03:00:00Z
    state variables: [air_temperature]
    filepath: testdata/bkg__MPI__PT3H_000001
  background error:
    covariance model: ensemble
    localization:
      localization method: SABER
      saber central block:
        saber block name: BUMP_NICAS
        calibration:
          general:
            default seed: 12
          drivers:
            multivariate strategy: univariate
            compute nicas: true
          nicas:
            resolution: 4.0
            explicit length-scales: true
            horizontal length-scale:
            - groups: [air_temperature]
              value: 3.0e4
            vertical length-scale:
            - groups: [air_temperature]
              value: 3.0
    members from template:
      template:
        date: 2010-01-01T03:00:00Z
        state variables: [air_temperature]
        filepath: testdata/ens__MPI__PT3H_%mem%
      pattern: %mem%
      zero padding: 6
      nmembers: 10
  observations:
    observers:
    - obs space:
        name: air_temperature
        simulated variables: [air_temperature]
        obsdatain:
          engine:
            type: H5File
            obsfile: testdata/obs_3d.nc
        obsdataout:
          engine:
            type: H5File
            obsfile: testdata/obs_3densvar.nc
      obs operator:
        name: VertInterp
        constant vertical coordinate values: *vert_coord
        observation vertical coordinate: height
        interpolation method: linear
      obs error:
        covariance model: diagonal
variational:
  minimizer:
    algorithm: PCG
  iterations:
  - diagnostics:
      departures: ombg0
    gradient norm reduction: 1.0e-10
    ninner: 10
    geometry: *geom
final:
  diagnostics:
    departures: oman
  increment:
    geometry: *geom
    output:
      state component:
        filepath: testdata/3densvar_incr__MPI_
output:
  filepath: testdata/3densvar_analysis__MPI_
test:
  reference filename: testref/3densvar.ref
