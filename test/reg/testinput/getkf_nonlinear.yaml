time window:
  begin: 2010-01-01T02:59:59Z
  length: PT2S
geometry:
  function space: StructuredColumns
  grid:
    type: regional
    nx: 35
    ny: 53
    dx: 5.0e3
    dy: 5.0e3
    lonlat(centre): [9.9, 56.3]
    projection:
      type: lambert_conformal_conic
      latitude0: 56.3
      longitude0: 0.0
    y_numbering: 1
  partitioner: checkerboard
  groups:
  - variables: [air_temperature]
    levels: 2
    vertical coordinate:
      profile: &vert_coord [1,2]
  halo: 2
background:
  members from template:
    template:
      date: 2010-01-01T03:00:00Z
      state variables: [air_temperature]
      filepath: testdata/ens__MPI__PT3H_%mem%
    pattern: %mem%
    zero padding: 6
    nmembers: 10
observations:
  observers:
  - obs space:
      name: air_temperature
      distribution:
        name: Halo
        halo size: 1200.0e3
      simulated variables: [air_temperature]
      obsdatain:
        engine:
          type: H5File
          obsfile: testdata/obs_3d.nc
      obsdataout:
        engine:
          type: H5File
          obsfile: testdata/obs_getkf_nonlinear.nc
    obs operator:
      name: VertInterp
      constant vertical coordinate values: *vert_coord
      observation vertical coordinate: height
      interpolation method: linear
    obs error:
      covariance model: diagonal
    obs localizations:
    - localization method: Horizontal Gaspari-Cohn
      lengthscale: 1000e3
      max nobs: 100
driver:
  save prior mean: true
  save posterior mean: true
  save posterior mean increment: true
  save posterior ensemble increments: true
  save prior variance: true
  save posterior variance: true
  update obs config with geometry info: true
local ensemble DA:
  solver: Deterministic GETKF
  vertical localization:
    lengthscale: 3.0
    lengthscale units: bogus
  inflation:
    rtps: 0.5
    rtpp: 0.5
    mult: 1.1
output:
  filepath: testdata/getkf_nonlinear_state
output increment:
  filepath: testdata/getkf_nonlinear_increment
output ensemble increments:
  filepath: testdata/getkf_nonlinear_increment
output mean prior:
  filepath: testdata/getkf_nonlinear_mean_prior
output variance prior:
  filepath: testdata/getkf_nonlinear_var_prior
output variance posterior:
  filepath: testdata/getkf_nonlinear_var_posterior
test:
  float relative tolerance: 1.0e-3
  reference filename: testref/getkf_nonlinear.ref
