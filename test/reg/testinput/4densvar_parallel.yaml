cost function:
  cost type: 4D-Ens-Var
  time window:
    begin: 2010-01-01T00:00:00Z
    length: PT06H
  subwindow: PT3H
  analysis variables: [air_temperature]
  geometry: &geom
    function space: StructuredColumns
    grid:
      type: regional
      nx: 71
      ny: 53
      dx: 2.5e3
      dy: 2.5e3
      lonlat(centre): [9.9, 56.3]
      projection:
        type: lambert_conformal_conic
        latitude0: 56.3
        longitude0: 0.0
      y_numbering: 1
    partitioner: checkerboard
    groups:
    - variables: [air_temperature]
      levels: 2
      vertical coordinate:
        profile: &vert_coord [1,2]
    halo: 2
  background:
    states:
    - date: 2010-01-01T00:00:00Z
      state variables: [air_temperature]
      filepath: testdata/bkg_PT0S_000001
    - date: 2010-01-01T03:00:00Z
      state variables: [air_temperature]
      filepath: testdata/bkg_PT3H_000001
    - date: 2010-01-01T06:00:00Z
      state variables: [air_temperature]
      filepath: testdata/bkg_PT6H_000001
  background error:
    covariance model: ensemble
    localization:
      localization method: SABER
      saber central block:
        saber block name: BUMP_NICAS
        calibration:
          general:
            default seed: 12
          drivers:
            multivariate strategy: univariate
            compute nicas: true
          nicas:
            resolution: 4.0
            explicit length-scales: true
            horizontal length-scale:
            - groups: [air_temperature]
              value: 3.0e4
            vertical length-scale:
            - groups: [air_temperature]
              value: 3.0
    members from template:
      template:
        states:
        - date: 2010-01-01T00:00:00Z
          state variables: [air_temperature]
          filepath: testdata/ens_PT0S_%mem%
        - date: 2010-01-01T03:00:00Z
          state variables: [air_temperature]
          filepath: testdata/ens_PT3H_%mem%
        - date: 2010-01-01T06:00:00Z
          state variables: [air_temperature]
          filepath: testdata/ens_PT6H_%mem%
      pattern: %mem%
      zero padding: 6
      nmembers: 10
  observations:
    observers:
    - obs space:
        name: air_temperature
        simulated variables: [air_temperature]
        obsdatain:
          engine:
            type: H5File
            obsfile: testdata/obs_4d.nc
        obsdataout:
          engine:
            type: H5File
            obsfile: testdata/obs_4densvar_parallel.nc
      obs operator:
        name: VertInterp
        constant vertical coordinate values: *vert_coord
        observation vertical coordinate: height
        interpolation method: linear
      obs error:
        covariance model: diagonal
variational:
  minimizer:
    algorithm: DRIPCG
  iterations:
  - diagnostics:
      departures: ombg0
    gradient norm reduction: 1.0e-10
    ninner: 10
    geometry: *geom
final:
  diagnostics:
    departures: oman
  increment:
    geometry: *geom
    output:
      state component:
        states:
        - date: 2010-01-01T00:00:00Z
          filepath: testdata/4densvar_parallel_incr_00
        - date: 2010-01-01T03:00:00Z
          filepath: testdata/4densvar_parallel_incr_03
        - date: 2010-01-01T06:00:00Z
          filepath: testdata/4densvar_parallel_incr_06
output:
  states:
  - date: 2010-01-01T00:00:00Z
    filepath: testdata/4densvar_parallel_analysis_00
  - date: 2010-01-01T03:00:00Z
    filepath: testdata/4densvar_parallel_analysis_03
  - date: 2010-01-01T06:00:00Z
    filepath: testdata/4densvar_parallel_analysis_06
test:
  reference filename: testref/4densvar_parallel.ref
