time window:
  begin: 2010-01-01T00:00:00Z
  length: PT6H
geometry:
  function space: StructuredColumns
  grid:
    type: regional
    nx: 35
    ny: 53
    dx: 5.0e3
    dy: 5.0e3
    lonlat(centre): [9.9, 56.3]
    projection:
      type: lambert_conformal_conic
      latitude0: 56.3
      longitude0: 0.0
    y_numbering: 1
  partitioner: checkerboard
  groups:
  - variables: [air_temperature]
    levels: 2
    vertical coordinate:
      profile: &vert_coord [1,2]
  halo: 2
background:
  members from template:
    template:
      states:
      - date: 2010-01-01T00:00:00Z
        state variables: [air_temperature]
        filepath: testdata/ens__MPI__PT0S_%mem%
      - date: 2010-01-01T03:00:00Z
        state variables: [air_temperature]
        filepath: testdata/ens__MPI__PT3H_%mem%
      - date: 2010-01-01T06:00:00Z
        state variables: [air_temperature]
        filepath: testdata/ens__MPI__PT6H_%mem%
    pattern: %mem%
    zero padding: 6
    nmembers: 10
observations:
  observers:
  - obs space:
      name: air_temperature
      distribution:
        name: Halo
        halo size: 1000.0e3
      simulated variables: [air_temperature]
      obsdatain:
        engine:
          type: H5File
          obsfile: testdata/obs_4d.nc
      obsdataout:
        engine:
          type: H5File
          obsfile: testdata/obs_letkf_linear_4d.nc
    obs operator:
      name: VertInterp
      constant vertical coordinate values: *vert_coord
      observation vertical coordinate: height
      interpolation method: linear
    obs error:
      covariance model: diagonal
    obs localizations:
    - localization method: Horizontal Gaspari-Cohn
      lengthscale: 1000e3
      max nobs: 100
driver:
  save prior mean: true
  save posterior mean: true
  save posterior mean increment: true
  save posterior ensemble increments: true
  save prior variance: true
  save posterior variance: true
  update obs config with geometry info: true
local ensemble DA:
  solver: Deterministic LETKF
  inflation:
    rtps: 0.5
    rtpp: 0.5
    mult: 1.1
  use linear observer: true
output:
  states:
  - date: 2010-01-01T00:00:00Z
    filepath: testdata/letkf_linear_4d_state__MPI__PT0S
  - date: 2010-01-01T03:00:00Z
    filepath: testdata/letkf_linear_4d_state__MPI__PT3H
  - date: 2010-01-01T06:00:00Z
    filepath: testdata/letkf_linear_4d_state__MPI__PT6H
output increment:
  filepath: testdata/letkf_linear_4d_increment__MPI_
output ensemble increments:
  filepath: testdata/letkf_linear_4d_increment__MPI_
output mean prior:
  states:
  - date: 2010-01-01T00:00:00Z
    filepath: testdata/letkf_linear_4d_mean_prior__MPI__PT0S
  - date: 2010-01-01T03:00:00Z
    filepath: testdata/letkf_linear_4d_mean_prior__MPI__PT3H
  - date: 2010-01-01T06:00:00Z
    filepath: testdata/letkf_linear_4d_mean_prior__MPI__PT6H
output variance prior:
  filepath: testdata/letkf_linear_4d_var_prior__MPI_
output variance posterior:
  filepath: testdata/letkf_linear_4d_var_posterior__MPI_
test:
  reference filename: testref/letkf_linear_4d.ref
