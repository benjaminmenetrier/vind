time window:
  begin: 2010-01-01T02:59:59Z
  length: PT2S
geometry:
  function space: StructuredColumns
  grid:
    type: regional
    nx: 71
    ny: 53
    dx: 2.5e3
    dy: 2.5e3
    lonlat(centre): [9.9, 56.3]
    projection:
      type: lambert_conformal_conic
      latitude0: 56.3
      longitude0: 0.0
    y_numbering: 1
  partitioner: checkerboard
  groups:
  - variables: [air_temperature]
    levels: 2
    vertical coordinate:
      profile: &vert_coord [1,2]
  halo: 2
background:
  members from template:
    template:
      date: 2010-01-01T03:00:00Z
      state variables: [air_temperature]
      filepath: testdata/ens_PT3H_%mem%
    pattern: %mem%
    zero padding: 6
    nmembers: 10
observations:
  observers:
  - obs space:
      name: air_temperature
      distribution:
        name: Halo
        halo size: 1000.0e3
      simulated variables: [air_temperature]
      obsdatain:
        engine:
          type: H5File
          obsfile: testdata/obs_letkf_nonlinear.nc
      obsdataout:
        engine:
          type: H5File
          obsfile: testdata/obs_letkf_read_members.nc
    obs operator:
      name: Identity
    obs error:
      covariance model: diagonal
    obs localizations:
    - localization method: Horizontal Gaspari-Cohn
      lengthscale: 1000e3
      max nobs: 100
driver:
  save prior mean: true
  save posterior mean: true
  save posterior mean increment: true
  save posterior ensemble increments: true
  save prior variance: true
  save posterior variance: true
  update obs config with geometry info: true
  read HX from disk: true
  do posterior observer: false
local ensemble DA:
  solver: Deterministic LETKF
  inflation:
    rtps: 0.5
    rtpp: 0.5
    mult: 1.1
output:
  filepath: testdata/letkf_read_members_state
output increment:
  filepath: testdata/letkf_read_members_increment
output ensemble increments:
  filepath: testdata/letkf_read_members_increment
output mean prior:
  filepath: testdata/letkf_read_members_mean_prior
output variance prior:
  filepath: testdata/letkf_read_members_var_prior
output variance posterior:
  filepath: testdata/letkf_read_members_var_posterior
test:
  reference filename: testref/letkf_read_members.ref
