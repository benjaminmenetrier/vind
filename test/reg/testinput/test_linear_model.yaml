geometry:
  function space: StructuredColumns
  grid:
    type: regional
    nx: 71
    ny: 53
    dx: 2.5e3
    dy: 2.5e3
    lonlat(centre): [9.9, 56.3]
    projection:
      type: lambert_conformal_conic
      latitude0: 56.3
      longitude0: 0.0
    y_numbering: 1
  partitioner: checkerboard
  groups:
  - variables: [air_temperature]
    levels: 2
  halo: 2
initial condition:
  date: 2010-01-01T00:00:00Z
  state variables: [air_temperature]
  filepath: testdata/attractor_P2D
background error:
  covariance model: SABER
  saber central block:
    saber block name: BUMP_NICAS
    calibration:
      drivers:
        multivariate strategy: univariate
        compute nicas: true
      nicas:
        resolution: 4.0
        explicit length-scales: true
        horizontal length-scale:
        - groups: [air_temperature]
          value: 3.0e4
        vertical length-scale:
        - groups: [air_temperature]
          value: 3.0
  saber outer blocks:
  - saber block name: StdDev
    read:
      model file:
        filepath: testdata/stddev
analysis variables: [air_temperature]
model: &model
  name: DDL95
  time step: PT12M
model aux control: {}
linear model:
  name: DDL95
  time step: PT12M
linear model test:
  forecast length: PT12M
  first multiplier TL: 1.e-12
  iterations TL: 1
  tolerance AD: 1.0e-12
  tolerance TL: 4.0e-2
time window:
  begin: 2010-01-01T00:00:00Z
  end: 2010-01-03T00:00:00Z
test:
  reference filename: testref/test_linear_model.ref
