geometry:
  function space: StructuredColumns
  grid:
    type: regional
    nx: 35
    ny: 53
    dx: 5.0e3
    dy: 5.0e3
    lonlat(centre): [9.9, 56.3]
    projection:
      type: lambert_conformal_conic
      latitude0: 56.3
      longitude0: 0.0
    y_numbering: 1
  partitioner: checkerboard
  groups:
  - variables: [air_temperature]
    levels: 2
  halo: 2
background:
  date: 2010-01-01T00:00:00Z
  state variables: [air_temperature]
  filepath: testdata/attractor__MPI__P2D
linear variable change tests:
- linear variable change:
    input variables: [air_temperature]
    output variables: [air_temperature]
    atlas file:
      date: 2010-01-01T00:00:00Z
      state variables: [air_temperature]
      filepath: testdata/stddev__MPI_
  tolerance inverse: 1.0e-12
test:
  float absolute tolerance: 1.0e-12
  reference filename: testref/test_linear_variable_change.ref
