_variables: &vars
    - ozone
    - carbon_monoxyde
    - nitrogen_dioxide
    - sulfur_dioxide
    - pm10
    - pm2p5
    - air_pressure
_chemVariables: &chemvars
    - ozone
    - carbon_monoxyde
    - nitrogen_dioxide
    - sulfur_dioxide
    - pm10
    - pm2p5
_levels: 
    profile: &levs [43, 44, 45, 46, 47]
    
time window:
  begin: 2017-12-16T21:00:00Z
  length: PT6H
geometry: &geom
  function space: StructuredColumns
  grid:
    type: structured
    xspace:
      type: linear
      N : 512
      start : -180.0
      end :  180.0
      endpoint: false
    yspace:
      type: linear
      N: 361
      start: -90.0
      end : 90.0
  partitioner: checkerboard
  halo: 1
  levels are top down: true
  groups:
  - variables: *chemvars  
    levels: 5
    vertical coordinate:
      profile: *levs
  - variables:
    - air_pressure
    levels: 5
    vertical coordinate:
      profile: *levs
  alias:
  - in code: ozone
    in file: O3
  - in code: carbon_monoxyde
    in file: CO
  - in code: nitrogen_dioxide
    in file: NO2
  - in code: sulfur_dioxide
    in file: SO2
  - in code: pm10
    in file: dry_pm10_mass
  - in code: pm2p5
    in file: dry_pm2p5_mass
  - in code: air_pressure
    in file: mid_layer_pressure
  io:
    total number of levels: 48
    initial date: 2017-12-16T12:00:00Z
    final date: 2017-12-18T00:00:00Z
    time step: 10800
state:
  date: 2017-12-17T00:00:00Z
  filepath: testdata/G006/REDUCED_MONARCH_d01_2017121612.nc
  format: bsc
  state variables: *vars
observations:
  observers:
  - obs space:
      name: AIRBASE_PM10
      obsdatain:
        engine:
          type: H5File
          obsfile: testdata/HDAT_AIRBASE_PM10-GLO-2017121612.nc
      obsdataout:
        engine:
          type: H5File
          obsfile: testdata/HOUT_GLO_air_pressure-2017121612.nc
      simulated variables: [particulatematter10Surface]
    obs operator:
      name: VertInterp
      vertical coordinate: air_pressure
      observation vertical coordinate: air_pressure
      observation vertical coordinate group: MetaData
      interpolation method: nearest-neighbor
      observation alias file: testinput/ufo_variable_name_map.yaml

test:
  reference filename: testref/hofx3d_air_pressure.ref
  test output filename: testdata/hofx3d_air_pressure.log
