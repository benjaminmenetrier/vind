input geometry: &geom
  function space: StructuredColumns
  grid:
    type: structured
    xspace:
      type: linear
      N : 512
      start : -180.0
      end :  180.0
      endpoint: false
    yspace:
      type: linear
      N: 361
      start: -90.0
      end : 90.0
  partitioner: checkerboard
  halo: 1
  levels are top down: true
  levels count from: 0
  groups:
  - variables:
    - ozone
    - carbon_monoxide
    - pm10
    levels: 48
  - variables:
    - lev_height
    - air_pressure
    levels: 48
  - variables:
    - air_pressure_levels
    levels: 49
  alias:
  - in code: ozone
    in file: O3
  - in code: carbon_monoxide
    in file: CO
  - in code: pm10
    in file: dry_pm10_mass
  - in code: lev_height
    in file: mid_layer_height_agl
  - in code: air_pressure
    in file: mid_layer_pressure
  - in code: air_pressure_levels
    in file: interface_pressure
  io:
    total number of levels: 48
    initial date: 2017-12-16T12:00:00Z
    final date: 2017-12-18T00:00:00Z
    time step: 10800
output geometry: *geom
states:
- input:
    date: 2017-12-17T00:00:00Z
    filepath: testdata/G006/REDUCED_MONARCH_d01_2017121612.nc
    format: bsc
    state variables:
    - ozone
    - carbon_monoxide
    - pm10
    - air_pressure
    - air_pressure_levels
  output:
    date: 2017-12-17T00:00:00Z
    filepath: testdata/output_2017121700.nc
    formats: [bsc]
- input:
    date: 2017-12-17T12:00:00Z
    filepath: testdata/G006/REDUCED_MONARCH_d01_2017121612.nc
    format: bsc
    state variables:
    - ozone
    - carbon_monoxide
    - pm10
    - air_pressure
    - air_pressure_levels
  output:
    date: 2017-12-17T12:00:00Z
    filepath: testdata/output_2017121712.nc
    formats: [bsc]
test:
  reference filename: testref/convertstate.ref
  test output filename: testdata/convertstate.log
