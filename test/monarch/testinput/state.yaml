_variables: &vars
    - ozone
    - carbon_monoxyde
    - nitrogen_dioxide
    - sulfur_dioxide
    - pm10
    - pm2p5
_levels: 
    profile: &levs [19, 20, 21, 22, 23]

geometry:
  function space: StructuredColumns
  grid:
    type: structured
    xspace:
      type: linear
      N : 351
      start : -35.0
      end :  35.0
    yspace:
      type: linear
      N: 271
      start: -27.0
      end : 27.0
    projection :
      type: rotated_lonlat
      north_pole: [190, 39]
    y_numbering: -1
  partitioner: checkerboard
  halo: 1
  levels are top down: true
  groups:
  - variables:
    - ozone
    - carbon_monoxyde
    - nitrogen_dioxide
    - sulfur_dioxide
    - pm10
    - pm2p5
    levels: 5
    vertical coordinate:
      profile: *levs
  alias:
  - in code: ozone
    in file: O3
  - in code: carbon_monoxyde
    in file: CO
  - in code: nitrogen_dioxide
    in file: NO2
  - in code: sulfur_dioxide
    in file: SO2
  - in code: pm10
    in file: dry_pm10_mass
  - in code: pm2p5
    in file: dry_pm2p5_mass
  io:
    total number of levels: 24
    initial date: 2022-06-30T12:00:00Z
    final date: 2022-07-02T00:00:00Z

state test:
  statefile:
    date: 2022-07-01T00:00:00Z
    filepath: testdata/006/REDUCED_MONARCH_d01_2022063012.nc
    format: bsc
    state variables: *vars
  write then read test:
    state write:
      date: 2022-07-01T00:00:00Z
      filepath: testdata/state_out.nc
      formats: [bsc]
      single date: false
      state variables: *vars
    state read:
      date: 2022-07-01T00:00:00Z
      filepath: testdata/state_out.nc
      format: bsc
      state variables: *vars
  date: 2022-07-01T00:00:00Z
  norm file: 71.976197083865785
  tolerance: 2.0e-08
  test variable change constructor: false

test:
  reference filename: testref/state.ref
