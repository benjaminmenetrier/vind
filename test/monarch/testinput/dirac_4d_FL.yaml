_variables: &vars
    - ozone
    - carbon_monoxyde
    - nitrogen_dioxide
    - sulfur_dioxide
    - pm10
    - pm2p5
_chemVariables: &chemvars
    - ozone
    - carbon_monoxyde
    - nitrogen_dioxide
    - sulfur_dioxide
    - pm10
    - pm2p5
_levels: 
    profile: &levs [19, 20, 21, 22, 23]
_scalingGas: &scalegas
    scaling factor: 1.e-6

# Mnemonics:
_memo:
  - &state_ref
    date: 2022-07-01T00:00:00Z
    filepath: testdata/006/REDUCED_MONARCH_d01_2022063012.nc
    format: bsc
    state variables: *chemvars
  - &member_ref
    date: 2022-07-01T00:00:00Z
    filepath: testdata/%mem%/REDUCED_MONARCH_d01_2022063012.nc
    format: bsc
    state variables: *chemvars
  - &out_ref
    date: 2022-07-01T00:00:00Z
    filepath: testdata/D4reg_FL_2022070100_%id%.nc
    formats: [bsc]

geometry:
  function space: StructuredColumns
  grid:
    type: structured
    xspace:
      type: linear
      N : 351
      start : -35.0
      end :  35.0
    yspace:
      type: linear
      N: 271
      start: -27.0
      end : 27.0
    projection :
      type: rotated_lonlat
      north_pole: [190, 39]
    y_numbering: -1
  partitioner: checkerboard
  halo: 1
  levels are top down: true
  groups:
  - variables: *chemvars  
    levels: 5
    vertical coordinate:
      profile: *levs
  alias:
  - in code: ozone
    in file: O3
    <<: *scalegas
  - in code: carbon_monoxyde
    in file: CO
    <<: *scalegas
  - in code: nitrogen_dioxide
    in file: NO2
    <<: *scalegas
  - in code: sulfur_dioxide
    in file: SO2
    <<: *scalegas
  - in code: pm10
    in file: dry_pm10_mass
  - in code: pm2p5
    in file: dry_pm2p5_mass
  io:
    total number of levels: 24
    initial date: 2022-06-30T12:00:00Z
    final date: 2022-07-02T00:00:00Z

background error:
  covariance model: ensemble
  members from template:
    template:
      states:
        - <<: *member_ref
          date: 2022-07-01T00:00:00Z
        - <<: *member_ref
          date: 2022-07-01T01:00:00Z
        - <<: *member_ref
          date: 2022-07-01T02:00:00Z
        - <<: *member_ref
          date: 2022-07-01T03:00:00Z
        - <<: *member_ref
          date: 2022-07-01T04:00:00Z
        - <<: *member_ref
          date: 2022-07-01T05:00:00Z
    pattern: %mem%
    zero padding: 3
    start: 0
    nmembers: 6
  localization:
    localization method: SABER
    time decay: PT3H
    saber central block:
      saber block name: FastLAM
      calibration:
        multivariate strategy: duplicated and weighted
        groups:
        - group name: var3d
          variables: *chemvars
        horizontal length-scale:
        - group: var3d
          value: 200.0e3
        vertical length-scale:
        - group: var3d
          value: 3.0
        default off-diagonal weight: 0.5
        specific off-diagonal weights:
        - variables pair: [ozone, carbon_monoxyde]
          weight: 0.2
        number of layers: 3
        resolution: 8

dirac:
  - {}
  - date: 2022-07-01T01:00:00Z
    lon:                 [ -10.0]
    lat:                 [  60.0]
    vertical coordinate: [    23]
    variable:            ['ozone']
  - {}
  - {}
  - date: 2022-07-01T04:00:00Z
    lon:                 [  7.91]
    lat:                 [  38.3]
    vertical coordinate: [    23]
    variable:            ['carbon_monoxyde']
  - {}

background:
  states:
    - <<: *state_ref
      date: 2022-07-01T00:00:00Z
    - <<: *state_ref
      date: 2022-07-01T01:00:00Z
    - <<: *state_ref
      date: 2022-07-01T02:00:00Z
    - <<: *state_ref
      date: 2022-07-01T03:00:00Z
    - <<: *state_ref
      date: 2022-07-01T04:00:00Z
    - <<: *state_ref
      date: 2022-07-01T05:00:00Z

  
output dirac:
  states:
    - <<: *out_ref
      date: 2022-07-01T00:00:00Z
      filepath: testdata/D4reg_FL_2022070100_%id%.nc
    - <<: *out_ref
      date: 2022-07-01T01:00:00Z
      filepath: testdata/D4reg_FL_2022070101_%id%.nc
    - <<: *out_ref
      date: 2022-07-01T02:00:00Z
      filepath: testdata/D4reg_FL_2022070102_%id%.nc
    - <<: *out_ref
      date: 2022-07-01T03:00:00Z
      filepath: testdata/D4reg_FL_2022070103_%id%.nc
    - <<: *out_ref
      date: 2022-07-01T04:00:00Z
      filepath: testdata/D4reg_FL_2022070104_%id%.nc
    - <<: *out_ref
      date: 2022-07-01T05:00:00Z
      filepath: testdata/D4reg_FL_2022070105_%id%.nc

test:
  reference filename: testref/dirac_4d_FL.ref
  test output filename: testdata/dirac_4d_FL.log
