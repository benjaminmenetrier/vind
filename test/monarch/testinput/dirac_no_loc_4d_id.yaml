_variables: &vars
    - ozone
    - carbon_monoxyde
    - nitrogen_dioxide
    - sulfur_dioxide
    - pm10
    - pm2p5
_chemVariables: &chemvars
    - ozone
    - carbon_monoxyde
    - nitrogen_dioxide
    - sulfur_dioxide
    - pm10
    - pm2p5
_levels: 
    profile: &levs [19, 20, 21, 22, 23]

# Mnemonics:
_memo:
  - &state_ref
    date: 2022-07-01T00:00:00Z
    filepath: testdata/006/REDUCED_MONARCH_d01_2022063012.nc
    format: bsc
    state variables: *chemvars
  - &out_ref
    date: 2022-07-01T00:00:00Z
    filepath: testdata/D4IDreg_2022070100.nc
    formats: [bsc]
    single date: true

geometry:
  function space: StructuredColumns
  grid:
    type: structured
    xspace:
      type: linear
      N : 351
      start : -35.0
      end :  35.0
    yspace:
      type: linear
      N: 271
      start: -27.0
      end : 27.0
    projection :
      type: rotated_lonlat
      north_pole: [190, 39]
    y_numbering: -1
  partitioner: checkerboard
  halo: 1
  levels are top down: true
  groups:
  - variables: *chemvars  
    levels: 5
    vertical coordinate:
      profile: *levs
  alias:
  - in code: ozone
    in file: O3
  - in code: carbon_monoxyde
    in file: CO
  - in code: nitrogen_dioxide
    in file: NO2
  - in code: sulfur_dioxide
    in file: SO2
  - in code: pm10
    in file: dry_pm10_mass
  - in code: pm2p5
    in file: dry_pm2p5_mass
  io:
    total number of levels: 24
    initial date: 2022-06-30T12:00:00Z
    final date: 2022-07-02T00:00:00Z

background error:
  covariance model: SABER
  time covariance: univariate
  saber central block:
    saber block name: ID

dirac:
  - {}
  - date: 2022-07-01T01:00:00Z
    lon:                 [ -10.0]
    lat:                 [  60.0]
    vertical coordinate: [    23]
    variable:            ['ozone']
  - {}
  - {}
  - date: 2022-07-01T04:00:00Z
    lon:                 [  7.91]
    lat:                 [  38.3]
    vertical coordinate: [    23]
    variable:            ['carbon_monoxyde']
  - {}

background:
  states:
    - <<: *state_ref
      date: 2022-07-01T00:00:00Z
    - <<: *state_ref
      date: 2022-07-01T01:00:00Z
    - <<: *state_ref
      date: 2022-07-01T02:00:00Z
    - <<: *state_ref
      date: 2022-07-01T03:00:00Z
    - <<: *state_ref
      date: 2022-07-01T04:00:00Z
    - <<: *state_ref
      date: 2022-07-01T05:00:00Z

  
output dirac:
  states:
    - <<: *out_ref
      date: 2022-07-01T00:00:00Z
      filepath: testdata/D4IDreg_2022070100.nc
    - <<: *out_ref
      date: 2022-07-01T01:00:00Z
      filepath: testdata/D4IDreg_2022070101.nc
    - <<: *out_ref
      date: 2022-07-01T02:00:00Z
      filepath: testdata/D4IDreg_2022070102.nc
    - <<: *out_ref
      date: 2022-07-01T03:00:00Z
      filepath: testdata/D4IDreg_2022070103.nc
    - <<: *out_ref
      date: 2022-07-01T04:00:00Z
      filepath: testdata/D4IDreg_2022070104.nc
    - <<: *out_ref
      date: 2022-07-01T05:00:00Z
      filepath: testdata/D4IDreg_2022070105.nc

test:
  reference filename: testref/dirac_no_loc_4d_id.ref
  test output filename: testdata/dirac_no_loc_4d_id.log
