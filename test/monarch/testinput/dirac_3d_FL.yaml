_variables: &vars
    - ozone
    - carbon_monoxyde
    - nitrogen_dioxide
    - sulfur_dioxide
    - pm10
    - pm2p5
_chemVariables: &chemvars
    - ozone
    - carbon_monoxyde
    - nitrogen_dioxide
    - sulfur_dioxide
    - pm10
    - pm2p5
_levels: 
    profile: &levs [19, 20, 21, 22, 23]
_scalingGas: &scalegas
    scaling factor: 1.e-6

geometry:
  function space: StructuredColumns
  grid:
    type: structured
    xspace:
      type: linear
      N : 351
      start : -35.0
      end :  35.0
    yspace:
      type: linear
      N: 271
      start: -27.0
      end : 27.0
    projection :
      type: rotated_lonlat
      north_pole: [190, 39]
    y_numbering: -1
  partitioner: checkerboard
  halo: 1
  levels are top down: true
  groups:
  - variables: *chemvars  
    levels: 5
    vertical coordinate:
      profile: *levs
  alias:
  - in code: ozone
    in file: O3
    <<: *scalegas
  - in code: carbon_monoxyde
    in file: CO
    <<: *scalegas
  - in code: nitrogen_dioxide
    in file: NO2
    <<: *scalegas
  - in code: sulfur_dioxide
    in file: SO2
    <<: *scalegas
  - in code: pm10
    in file: dry_pm10_mass
  - in code: pm2p5
    in file: dry_pm2p5_mass
  io:
    total number of levels: 24
    initial date: 2022-06-30T12:00:00Z
    final date: 2022-07-02T00:00:00Z

background error:
  covariance model: ensemble
  members from template:
    template:
      date: 2022-07-01T12:00:00Z
      filepath: testdata/%mem%/REDUCED_MONARCH_d01_2022063012.nc
      format: bsc
      state variables: *chemvars
    pattern: %mem%
    zero padding: 3
    start: 0
    nmembers: 6
  localization:
    localization method: SABER
    saber central block:
      saber block name: FastLAM
      calibration:
        multivariate strategy: duplicated and weighted
        groups:
        - group name: var3d
          variables: *chemvars
        horizontal length-scale:
        - group: var3d
          value: 200.0e3
        vertical length-scale:
        - group: var3d
          value: 3.0
        default off-diagonal weight: 0.5
        specific off-diagonal weights:
        - variables pair: [ozone, carbon_monoxyde]
          weight: 0.2
        number of layers: 3
        resolution: 8

dirac:
  date: 2022-07-01T12:00:00Z
  lon:                 [              7.9,   17.9]
  lat:                 [             38.3,   60.3]
  vertical coordinate: [               23,     23]
  variable:            ['carbon_monoxyde', 'pm10']

background:
  date: 2022-07-01T12:00:00Z
  filepath: testdata/006/REDUCED_MONARCH_d01_2022063012.nc
  format: bsc
  state variables: *chemvars

  
output dirac:
  filepath: testdata/D3reg_FL_%id%.nc
  formats: [bsc]
  date: 2022-07-01T12:00:00Z

test:
  reference filename: testref/dirac_3d_FL.ref
  test output filename: testdata/dirac_3d_FL.log
