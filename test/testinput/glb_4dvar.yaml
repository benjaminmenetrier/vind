cost function:
  cost type: 3D-Var
  time window:
    begin: 2010-01-01T00:00:00Z
    length: PT6H
  analysis variables: [air_temperature]
  geometry: &geom
    function space: StructuredColumns
    grid:
      type: regular_lonlat
      N: 10
    groups:
    - variables:
       - air_temperature
      levels: 2
      vertical coordinate:
        profile: &vert_coord [1,2]
    halo: 2
  model:
    name: DDL95
    time step: PT1H
  background:
    date: 2010-01-01T00:00:00Z
    state variables:
    - air_temperature
    filepath: testdata/glb_bkg_00_000001
  background error:
    covariance model: SABER
    saber central block:
      saber block name: BUMP_NICAS
      calibration:
        general:
          default seed: 12
        drivers:
          multivariate strategy: univariate
          compute nicas: true
        nicas:
          resolution: 4.0
          explicit length-scales: true
          horizontal length-scale:
          - groups:
            - air_temperature
            value: 4.0e6
          vertical length-scale:
          - groups:
            - air_temperature
            value: 3.0
    saber outer blocks:
    - saber block name: StdDev
      read:
        model file:
          filepath: testdata/glb_stddev
  observations:
    observers:
    - obs space:
        name: air_temperature
        simulated variables: [air_temperature]
        obsdatain:
          engine:
            type: H5File
            obsfile: testdata/glb_obs_4d.nc
        obsdataout:
          engine:
            type: H5File
            obsfile: testdata/glb_obs_4dvar.nc
      obs operator:
        name: VertInterp
        constant vertical coordinate values: *vert_coord
        observation vertical coordinate: height
        interpolation method: linear
      obs error:
        covariance model: diagonal
variational:
  minimizer:
    algorithm: DRIPCG
  iterations:
  - diagnostics:
      departures: ombg0
    gradient norm reduction: 1.0e-10
    ninner: 10
    geometry: *geom
final:
  diagnostics:
    departures: oman
  increment:
    geometry: *geom
    output:
      state component:
        filepath: testdata/glb_4dvar_incr
output:
  filepath: testdata/glb_4dvar_analysis___DATE__
  date pattern: __DATE__
  frequency: PT06H
test:
  reference filename: testref/glb_4dvar.ref
