_variables: &vars
    - ozone
    - carbon_monoxyde
    - nitrogen_dioxide
    - sulfur_dioxide
    - pm10
    - pm2p5
_chemVariables: &chemvars
    - ozone
    - carbon_monoxyde
    - nitrogen_dioxide
    - sulfur_dioxide
    - pm10
    - pm2p5
    
geometry:
  function space: StructuredColumns
  grid:
    type: regional
    dx: 0.1
    dy: 0.1
    nx: 720
    ny: 440
    xmin: -25.95
    ymin: 28.05
  partitioner: "checkerboard"
  halo: 1
  levels are top down: true
  groups:
  - variables: *vars
    levels: 5
    vertical coordinate:
      profile: [19, 20, 21, 22, 23]
  alias:
  - in code: ozone
    in file: O3
  - in code: carbon_monoxyde
    in file: CO
  - in code: nitrogen_dioxide
    in file: NO2
  - in code: sulfur_dioxide
    in file: SO2
  - in code: pm10
    in file: dry_pm10_mass
  - in code: pm2p5
    in file: dry_pm2p5_mass
  io:
    initial date: 2022-06-30T12:00:00Z

increment test:
  date: 2022-07-01T12:00:00Z
  skip atlas: 1
  dirac:
    date: 2022-07-01T12:00:00Z
    lon:                 [7.9]
    lat:                 [38.3]
    vertical coordinate: [23]
    variable:            ['ozone']
    
inc variables: *chemvars

test:
  reference filename: testref/aq_increment.ref
  test output filename: testdata/aq_increment.log
