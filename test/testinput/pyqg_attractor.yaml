geometry:
  function space: StructuredColumns
  grid:
    type : zonal_band
    nx : 64
    ny : 64
    north : 70
    south : 30
  groups:
  - variables:
    - air_upward_absolute_vorticity
    levels: 3
  halo: 1
initial condition:
  date: 2009-01-01T06:00:00Z
  state variables:
  - air_upward_absolute_vorticity
  random sigma: 1.0e-7
model:
  name: python
  python module: ModelPythonPyQG
  tstep: PT1800S
forecast length: P365D
output:
  filepath: testdata/pyqg_attractor___RANGE__
  range pattern: __RANGE__
  frequency: P365D
prints:
  frequency: P365D
test:
  reference filename: testref/pyqg_attractor.ref
