cost function:
  cost type: 3D-Var
  time window:
    begin: 2010-01-01T06:00:00Z
    length: PT12H
  analysis variables: [air_temperature]
  geometry: &geom
    function space: StructuredColumns
    grid:
      type : regional
      nx: 64
      ny: 32
      dx: 10e3
      dy: 10e3
      lonlat(centre): [4.0,50.0]
      projection:
        type: lambert_conformal_conic
        longitude0: 4.0
        latitude0: 50.0
    groups:
    - variables:
      - air_temperature
      levels: 3
      vertical coordinate:
        profile: &vert_coord [1,2,3]
    halo: 2
  background:
    date: 2010-01-01T12:00:00Z
    state variables:
    - air_temperature
    filepath: testdata/ddl95_bkg_PT6H_000001
  background error:
    covariance model: SABER
    saber central block:
      saber block name: BUMP_NICAS
      calibration:
        drivers:
          multivariate strategy: univariate
          compute nicas: true
        nicas:
          resolution: 4.0
          explicit length-scales: true
          horizontal length-scale:
          - groups:
            - air_temperature
            value: 1.0e6
          vertical length-scale:
          - groups:
            - air_temperature
            value: 3.0
    saber outer blocks:
    - saber block name: StdDev
      read:
        model file:
          filepath: testdata/ddl95_stddev
  observations:
    observers:
    - obs space:
        name: air_temperature
        simulated variables: [air_temperature]
        obsdatain:
          engine:
            type: H5File
            obsfile: testdata/ddl95_obs.nc
        obsdataout:
          engine:
            type: H5File
            obsfile: testdata/ddl95_3dvar.nc
      obs operator:
        name: VertInterp
        constant vertical coordinate values: *vert_coord
        observation vertical coordinate: height
        interpolation method: linear
      obs error:
        covariance model: diagonal
variational:
  minimizer:
    algorithm: DRIPCG
  iterations:
  - diagnostics:
      departures: ombg0
    gradient norm reduction: 1.0e-10
    ninner: 10
    geometry: *geom
final:
  diagnostics:
    departures: oman
  increment:
    geometry: *geom
    output:
      state component:
        filepath: testdata/ddl95_3dvar_incr
output:
  filepath: testdata/ddl95_3dvar_analysis
test:
  reference filename: testref/ddl95_3dvar.ref
  float absolute tolerance: 1.0e-12
