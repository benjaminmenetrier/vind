geometry:
  function space: StructuredColumns
  grid:
    type: regular_lonlat
    N: 10
  groups:
  - variables:
    - air_temperature
    levels: 2
  halo: 2
initial condition:
  date: 2010-01-01T00:00:00Z
  state variables:
  - air_temperature
  filepath: testdata/glb_attractor_P2D
background error:
  covariance model: SABER
  saber central block:
    saber block name: BUMP_NICAS
    calibration:
      drivers:
        multivariate strategy: univariate
        compute nicas: true
      nicas:
        resolution: 4.0
        explicit length-scales: true
        horizontal length-scale:
        - groups:
          - air_temperature
          value: 4.0e6
        vertical length-scale:
        - groups:
          - air_temperature
          value: 3.0
  saber outer blocks:
  - saber block name: StdDev
    read:
      model file:
        filepath: testdata/glb_stddev
analysis variables: [air_temperature]
model:
  name: DDL95
  time step: PT1H
model aux control: {}
linear model:
  trajectory:
    time step: PT1H
  time step: PT1H
  name: DDL95
linear model test:
  forecast length: P2D
  iterations TL: 12
  tolerance AD: 1.0e-12
  tolerance TL: 1.0e-6
time window:
  begin: 2010-01-01T00:00:00Z
  end: 2010-01-03T00:00:00Z
test:
  reference filename: testref/glb_test_linear_model.ref
