_variables: &vars
    - ozone
    - carbon_monoxyde
    - nitrogen_dioxide
    - sulfur_dioxide
    - pm10
    - pm2p5
_chemVariables: &chemvars
    - ozone
    - carbon_monoxyde
    - nitrogen_dioxide
    - sulfur_dioxide
    - pm10
    - pm2p5
_levels: 
    profile: &levs [19, 20, 21, 22, 23]

geometry:
  function space: StructuredColumns
  grid:
    type: structured
    xspace:
      type: linear
      N : 351
      start : -35.0
      end :  35.0
    yspace:
      type: linear
      N: 271
      start: -27.0
      end : 27.0
    projection :
      type: rotated_lonlat
      north_pole: [190, 39]
    y_numbering: -1
  partitioner: checkerboard
  halo: 1
  levels are top down: true
  groups:
  - variables: *chemvars  
    levels: 5
    vertical coordinate:
      profile: *levs
  alias:
  - in code: ozone
    in file: O3
  - in code: carbon_monoxyde
    in file: CO
  - in code: nitrogen_dioxide
    in file: NO2
  - in code: sulfur_dioxide
    in file: SO2
  - in code: pm10
    in file: dry_pm10_mass
  - in code: pm2p5
    in file: dry_pm2p5_mass
  io:
    total number of levels: 24
    initial date: 2022-06-30T12:00:00Z
    final date: 2022-07-02T00:00:00Z

ensemble:
  members from template:
    template:
      date: 2022-07-01T12:00:00Z
      filepath: testdata/%mem%/REDUCED_MONARCH_d01_2022063012.nc
      format: bsc
      state variables: *chemvars
    pattern: %mem%
    zero padding: 3
    start: 0
    nmembers: 6

variance output:
  filepath: testdata/monarch_variance.nc
  formats: [bsc]
  date: 2022-07-01T12:00:00Z

standard deviation output:
  filepath: testdata/monarch_sttdev.nc
  formats: [bsc]
  date: 2022-07-01T12:00:00Z

mean output:
  filepath: testdata/monarch_mean.nc
  formats: [bsc]
  date: 2022-07-01T12:00:00Z

test:
  reference filename: testref/jedi/monarch_ens_mean_variance.ref
  test output filename: testdata/monarch_ens_mean_variance.log
