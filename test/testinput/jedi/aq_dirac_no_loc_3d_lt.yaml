_variables: &vars
    - ozone
    - carbon_monoxyde
    - nitrogen_dioxide
    - sulfur_dioxide
    - pm10
    - pm2p5
_chemVariables: &chemvars
    - ozone
    - carbon_monoxyde
    - nitrogen_dioxide
    - sulfur_dioxide
    - pm10
    - pm2p5
_defaultAddConst: 
    additive constant: &defaddconst 1.e-10 
_ozoneAddConst: 
    additive constant: &o3addconst 5.e-9 
_logTransform: &logtransform
    log transform: true
    additive constant: *defaddconst

geometry:
  function space: StructuredColumns
  partitioner: "checkerboard"
  grid:
    type: regional
    dx: 0.1
    dy: 0.1
    nx: 720
    ny: 440
    xmin: -25.95
    ymin: 28.05
  levels are top down: true
  groups:
  - variables: *chemvars
    levels: 5
    vertical coordinate:
      profile: [19, 20, 21, 22, 23]
  alias:
  - in code: ozone
    in file: O3
    <<: *logtransform
    additive constant: *o3addconst
  - in code: carbon_monoxyde
    in file: CO
    <<: *logtransform
  - in code: nitrogen_dioxide
    in file: NO2
    <<: *logtransform
  - in code: sulfur_dioxide
    in file: SO2
    <<: *logtransform
  - in code: pm10
    in file: dry_pm10_mass
    <<: *logtransform
  - in code: pm2p5
    in file: dry_pm2p5_mass
    <<: *logtransform
  io:
    initial date: 2022-06-30T12:00:00Z

background error:
  covariance model: ensemble
  members from template:
    template:
      date: 2022-07-01T12:00:00Z
      filepath: testdata/E%mem%/MONARCH_2022070112_E%mem%.nc
      format: aq
      state variables: *chemvars
    pattern: %mem%
    zero padding: 4
    start: 0
    nmembers: 6

# Identity block (for projection testing)    
#background error:
#  covariance model: SABER
#  saber central block:
#    saber block name: ID

dirac:
  date: 2022-07-01T12:00:00Z
  lon:                 [              7.9,   17.9]
  lat:                 [             38.3,   60.3]
  vertical coordinate: [               23,     23]
  variable:            ['carbon_monoxyde', 'pm10']

background:
  date: 2022-07-01T12:00:00Z
  filepath: testdata/forecast/MONARCH_2022070112.nc
  format: aq
  state variables: *chemvars


output dirac:
  filepath: testdata/aq_D3reg_no_loc_lt.nc
  formats: [aq]
  date: 2022-07-01T12:00:00Z

test:
  reference filename: testref/jedi/aq_dirac_no_loc_3d_lt.ref
  test output filename: testdata/aq_dirac_no_loc_3d_lt.log
