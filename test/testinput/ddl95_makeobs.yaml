time window:
  begin: 2010-01-01T06:00:00Z
  length: PT12H
geometry:
  function space: StructuredColumns
  grid:
    type : regional
    nx: 64
    ny: 32
    dx: 10e3
    dy: 10e3
    lonlat(centre): [4.0,50.0]
    projection:
      type: lambert_conformal_conic
      longitude0: 4.0
      latitude0: 50.0
  groups:
  - variables:
    - air_temperature
    levels: 3
    vertical coordinate:
      profile: &vert_coord [1,2,3]
  halo: 2
initial condition:
  date: 2010-01-01T06:00:00Z
  state variables:
  - air_temperature
  filepath: testdata/ddl95_truth_PT6H
forecast length: PT12H
model:
  name: DDL95
  time step: PT1H
observations:
  obs perturbations: true
  observers:
  - obs space:
      name: air_temperature
      simulated variables: [air_temperature]
      observed variables: [air_temperature]
      obsdatain:
        engine:
          type: GenList
          lats: [50.0,50.0,50.0,50.0,50.0,50.0,50.0]
          lons: [4.0,4.0,4.0,4.0,4.0,4.0,4.0]
          dateTimes: [0,3600,7200,10800,14400,18000,21600]
          vert coord type: height
          vert coords: [1.3,1.3,1.3,1.3,1.3,1.3,1.3]
          epoch: seconds since 2010-01-01T06:00:00Z
          obs errors: [0.1]
      obsdataout:
        engine:
          type: H5File
          obsfile: testdata/ddl95_obs.nc
    obs operator:
      name: VertInterp
      constant vertical coordinate values: *vert_coord
      observation vertical coordinate: height
      interpolation method: linear
    obs error:
      covariance model: diagonal
make obs: true
test:
  reference filename: testref/ddl95_makeobs.ref
