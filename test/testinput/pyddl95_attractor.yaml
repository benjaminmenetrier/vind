geometry:
  function space: StructuredColumns
  grid:
    type : zonal_band
    nx : 64
    ny : 32
    north : 70
    south : 30
  groups:
  - variables:
    - air_temperature
    levels: 3
initial condition:
  date: 2009-12-30T06:00:00Z
  state variables:
  - air_temperature
  random sigma: 4.0
model:
  name: python
  python module: ModelPythonDDL95
  time step: PT1H
forecast length: P2D
output:
  filepath: testdata/pyddl95_attractor___RANGE__
  range pattern: __RANGE__
  frequency: P2D
prints:
  frequency: P2D
test:
  reference filename: testref/pyddl95_attractor.ref
