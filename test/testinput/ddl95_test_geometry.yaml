geometry:
  function space: StructuredColumns
  grid:
    type : regional
    nx: 64
    ny: 32
    dx: 10e3
    dy: 10e3
    lonlat(centre): [4.0,50.0]
    projection:
      type: lambert_conformal_conic
      longitude0: 4.0
      latitude0: 50.0
  groups:
  - variables:
    - air_temperature
    levels: 3
test:
  reference filename: testref/ddl95_test_geometry.ref
