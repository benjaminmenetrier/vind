_variables: &vars
    - ozone
    - carbon_monoxyde
    - nitrogen_dioxide
    - sulfur_dioxide
    - pm10
    - pm2p5
_chemVariables: &chemvars
    - ozone
    - carbon_monoxyde
    - nitrogen_dioxide
    - sulfur_dioxide
    - pm10
    - pm2p5

# Mnemonics:
_memo:
  - &state_ref
    date: 2022-07-01T00:00:00Z
    filepath: testdata/forecast/MONARCH_2022070100.nc
    format: aq
    state variables: *chemvars
  - &member_ref
    date: 2022-07-01T00:00:00Z
    filepath: testdata/E%mem%/MONARCH_2022070100_E%mem%.nc
    format: aq
    state variables: *chemvars
  - &out_ref
    date: 2022-07-01T00:00:00Z
    filepath: testdata/aq_D4reg_2022070100_%id%.nc
    formats: [aq]

geometry:
  function space: StructuredColumns
  partitioner: "checkerboard"
  grid:
    type: regional
    dx: 0.1
    dy: 0.1
    nx: 720
    ny: 440
    xmin: -25.95
    ymin: 28.05
  levels are top down: true
  groups:
  - variables: *chemvars
    levels: 5
    vertical coordinate:
      profile: [19, 20, 21, 22, 23]
  alias:
  - in code: ozone
    in file: O3
  - in code: carbon_monoxyde
    in file: CO
  - in code: nitrogen_dioxide
    in file: NO2
  - in code: sulfur_dioxide
    in file: SO2
  - in code: pm10
    in file: dry_pm10_mass
  - in code: pm2p5
    in file: dry_pm2p5_mass
  io:
    initial date: 2022-06-30T12:00:00Z

background error:
  covariance model: ensemble
  members from template:
    template:
      states:
        - <<: *member_ref
          date: 2022-07-01T00:00:00Z
          filepath: testdata/E%mem%/MONARCH_2022070100_E%mem%.nc
        - <<: *member_ref
          date: 2022-07-01T01:00:00Z
          filepath: testdata/E%mem%/MONARCH_2022070101_E%mem%.nc
        - <<: *member_ref
          date: 2022-07-01T02:00:00Z
          filepath: testdata/E%mem%/MONARCH_2022070102_E%mem%.nc
        - <<: *member_ref
          date: 2022-07-01T03:00:00Z
          filepath: testdata/E%mem%/MONARCH_2022070103_E%mem%.nc
        - <<: *member_ref
          date: 2022-07-01T04:00:00Z
          filepath: testdata/E%mem%/MONARCH_2022070104_E%mem%.nc
        - <<: *member_ref
          date: 2022-07-01T05:00:00Z
          filepath: testdata/E%mem%/MONARCH_2022070105_E%mem%.nc
    pattern: %mem%
    zero padding: 4
    start: 0
    nmembers: 6
  localization:
    localization method: SABER
    time decay: PT3H
    saber central block:
      saber block name: BUMP_NICAS
      calibration:
        nicas:
          resolution: 5.0
          explicit length-scales: true
          horizontal length-scale:
          - groups: [common]
            value: &common_length_scale 200.0e3
          vertical length-scale:
          - groups: [common]
            value: 3.0
          default off-diagonal weight: 0.5
          specific off-diagonal weights:
          - variables pair: [ozone, carbon_monoxyde]
            weight: 0.2
        general:
          deprecated hull: false
          universe length-scale: *common_length_scale
        drivers:
          multivariate strategy: duplicated and weighted
          compute nicas: true

dirac:
  - {}
  - date: 2022-07-01T01:00:00Z
    lon:                 [ -10.0]
    lat:                 [  60.0]
    vertical coordinate: [    23]
    variable:            ['ozone']
  - {}
  - {}
  - date: 2022-07-01T04:00:00Z
    lon:                 [   7.9]
    lat:                 [  38.3]
    vertical coordinate: [    23]
    variable:            ['carbon_monoxyde']
  - {}

background:
  states:
    - <<: *state_ref
      date: 2022-07-01T00:00:00Z
      filepath: testdata/forecast/MONARCH_2022070100.nc
    - <<: *state_ref
      date: 2022-07-01T01:00:00Z
      filepath: testdata/forecast/MONARCH_2022070101.nc
    - <<: *state_ref
      date: 2022-07-01T02:00:00Z
      filepath: testdata/forecast/MONARCH_2022070102.nc
    - <<: *state_ref
      date: 2022-07-01T03:00:00Z
      filepath: testdata/forecast/MONARCH_2022070103.nc
    - <<: *state_ref
      date: 2022-07-01T04:00:00Z
      filepath: testdata/forecast/MONARCH_2022070104.nc
    - <<: *state_ref
      date: 2022-07-01T05:00:00Z
      filepath: testdata/forecast/MONARCH_2022070105.nc

  
output dirac:
  states:
    - <<: *out_ref
      date: 2022-07-01T00:00:00Z
      filepath: testdata/aq_D4reg_2022070100_%id%.nc
    - <<: *out_ref
      date: 2022-07-01T01:00:00Z
      filepath: testdata/aq_D4reg_2022070101_%id%.nc
    - <<: *out_ref
      date: 2022-07-01T02:00:00Z
      filepath: testdata/aq_D4reg_2022070102_%id%.nc
    - <<: *out_ref
      date: 2022-07-01T03:00:00Z
      filepath: testdata/aq_D4reg_2022070103_%id%.nc
    - <<: *out_ref
      date: 2022-07-01T04:00:00Z
      filepath: testdata/aq_D4reg_2022070104_%id%.nc
    - <<: *out_ref
      date: 2022-07-01T05:00:00Z
      filepath: testdata/aq_D4reg_2022070105_%id%.nc
      date: 2022-07-01T05:00:00Z

test:
  reference filename: testref/aq_dirac_4d.ref
  test output filename: testdata/aq_dirac_4d.log
