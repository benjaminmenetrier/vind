_variables: &vars
    - ozone
    - carbon_monoxyde
    - nitrogen_dioxide
    - sulfur_dioxide
    - pm10
    - pm2p5
_chemVariables: &chemvars
    - ozone
    - carbon_monoxyde
    - nitrogen_dioxide
    - sulfur_dioxide
    - pm10
    - pm2p5
_defaultAddConst: 
    additive constant: &defaddconst 1.e-10 
_ozoneAddConst: 
    additive constant: &o3addconst 5.e-9 
_logTransform: &logtransform
    log transform: true
    additive constant: *defaddconst
_o3_ObsErrFactor:
    total coefficient: &o3_obserr_factor 0.2
_o3_BkgBheckQCFactor:
    threshold: &o3_bkgcheckQC_factor 3.0
_o3_ObsErrMin:
    error parameter: &o3_obserr_min 1.e-3
_o3_ObsErrCheckMax:
    absolute threshold: &o3_obserr_checkmax 4.5

cost function:
  cost type: 3D-Var
  time window:
    begin: 2022-07-01T09:00:00Z
    length: PT6H
  analysis variables: *chemvars
  jb evaluation: false
  geometry: &geom
    function space: StructuredColumns
    grid:
      type: regional
      dx: 0.1
      dy: 0.1
      nx: 720
      ny: 440
      xmin: -25.95
      ymin: 28.05
    partitioner: "checkerboard"
    halo: 1
    levels are top down: true
    groups:
    - variables: *chemvars
      levels: 5
      vertical coordinate:
        profile: [19, 20, 21, 22, 23]
    alias:
    - in code: ozone
      in file: O3
      <<: *logtransform
      additive constant: *o3addconst
    - in code: carbon_monoxyde
      in file: CO
      <<: *logtransform
    - in code: nitrogen_dioxide
      in file: NO2
      <<: *logtransform
    - in code: sulfur_dioxide
      in file: SO2
      <<: *logtransform
    - in code: pm10
      in file: dry_pm10_mass
      <<: *logtransform
    - in code: pm2p5
      in file: dry_pm2p5_mass
      <<: *logtransform
    io:
      initial date: 2022-06-30T12:00:00Z
  background:
    date: 2022-07-01T12:00:00Z
    filepath: testdata/forecast/MONARCH_2022070112.nc
    format: aq
    state variables: *chemvars
  background error:
    covariance model: ensemble
    members from template:
      template:
        date: 2022-07-01T12:00:00Z
        filepath: testdata/E%mem%/MONARCH_2022070112_E%mem%.nc
        format: aq
        state variables: *chemvars
      pattern: %mem%
      zero padding: 4
      start: 0
      nmembers: 6
    localization:
      localization method: SABER
      saber central block:
        saber block name: BUMP_NICAS
        read:
          nicas:
            resolution: 8.0
            smooth interpolation factor: 0.8
            explicit length-scales: true
            horizontal length-scale:
              - groups: [common]
                value: &common_length_scale 200.0e3
            vertical length-scale:
              - groups: [common]
                value: 3.0
            default off-diagonal weight: 0.5
            specific off-diagonal weights:
            - variables pair: [ozone, carbon_monoxyde]
              weight: 0.2
          general:
            deprecated hull: false
            universe length-scale: *common_length_scale
          drivers:
            multivariate strategy: duplicated and weighted
            read global nicas: true
          io:
            data directory: testdata
            files prefix: aq_nicas_3d
            io tasks: 4
  observations:
    observers:
    - obs space:
        name: AIRBASE_O3
        obsdatain:
          engine:
            type: H5File
            obsfile: testdata/HDAT_AIRBASE_O3-2022070112.nc
        obsdataout:
          engine:
            type: H5File
            obsfile: testdata/HSTAT_aq3Dlt_AIRBASE_O3-2022070112.nc
        simulated variables: [ozoneSurface]
      obs filters:
        - filter: Variable Assignment
          assignments:
          - name: MetaData/log_transf_c_t
            type: float
            value: *o3addconst
        - filter: Variable Assignment
          assignments:
          - name: DerivedObsError/ozoneSurface_fraction
            type: float
            function:
              name: ObsFunction/Arithmetic
              options:
                variables:
                - name: ObsValue/ozoneSurface
                total coefficient: *o3_obserr_factor
        - filter: Variable Assignment
          assignments:
          - name: DerivedObsError/ozoneSurface_up
            type: float
            function:
              name: ObsFunction/Arithmetic
              options:
                variables:
                - name: ObsValue/ozoneSurface
                - name: DerivedObsError/ozoneSurface_fraction
                coefs: [ 1.0, 0.5 ]
        - filter: Variable Assignment
          assignments:
          - name: DerivedObsError/ozoneSurface_down
            type: float
            function:
              name: ObsFunction/Arithmetic
              options:
                variables:
                - name: ObsValue/ozoneSurface
                - name: DerivedObsError/ozoneSurface_fraction
                coefs: [ 1.0, -0.5 ]
        - filter: Variable Assignment
          assignments:
          - name: DerivedObsError/ozoneSurface
            type: float
            function:
              name: ObsFunction/Arithmetic
              options:
                variables:
                - name: DerivedObsError/ozoneSurface_up
                - name: DerivedObsError/ozoneSurface_down
                log bases: [ 10, 10 ]
                coefs: [ 1.0, -1.0 ]
        - filter: Variable Assignment
          assignments:
          - name: DerivedObsValue/ozoneSurface
            type: float
            function:
              name: ObsFunction/Arithmetic
              options:
                variables:
                - name: ObsValue/ozoneSurface
                - name: MetaData/log_transf_c_t
                total log base: 10
        - filter: Perform Action
          filter variables:
          - name: ozoneSurface
          action:
            name: assign error
            error function:
              name: ObsFunction/Arithmetic
              options:
                variables:
                - name: DerivedObsError/ozoneSurface
          where:
            - variable:
                name: DerivedObsError/ozoneSurface
              minvalue: *o3_obserr_min
        - filter: Perform Action
          filter variables:
          - name: ozoneSurface
          action:
            name: assign error
            error parameter: *o3_obserr_min
          where:
            - variable:
                name: DerivedObsError/ozoneSurface
              maxvalue: *o3_obserr_min
        - filter: Background Check
          filter variables:
          - name: ozoneSurface
          threshold: *o3_bkgcheckQC_factor
          absolute threshold: *o3_obserr_checkmax
      obs operator:
        name: VertInterp
        constant vertical coordinate values: [0, 0, 0, 0, 1]
        observation vertical coordinate: air_pressure
        interpolation method: nearest-neighbor
        observation alias file: testinput/monarch_ufo_variable_name_map.yaml
      obs error:
        covariance model: diagonal
variational:
  minimizer:
    algorithm: DRIPCG
  iterations:
  - diagnostics:
      departures: ombg0
    gradient norm reduction: 1.0e-10
    ninner: 20
    geometry: *geom
final:
  diagnostics:
    departures: oman
        
output:
  date: 2022-07-01T12:00:00Z
  filepath: testdata/aq_3densvar_lt_analysis_2022070112.nc
  formats: [aq]
test:
  reference filename: testref/aq_3densvar_lt.ref
  test output filename: testdata/aq_3densvar_lt.log
    

