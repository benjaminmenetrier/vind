_variables: &vars
    - ozone
    - carbon_monoxyde
    - nitrogen_dioxide
    - sulfur_dioxide
    - pm10
    - pm2p5
    - air_pressure
_chemVariables: &chemvars
    - ozone
    - carbon_monoxyde
    - nitrogen_dioxide
    - sulfur_dioxide
    - pm10
    - pm2p5
_levels: 
    profile: &levs [19, 20, 21, 22, 23]
    
time window:
  begin: 2022-07-01T09:00:00Z
  length: PT6H
geometry: &geom
  function space: StructuredColumns
  grid:
    type: structured
    xspace:
      type: linear
      N : 351
      start : -35.0
      end :  35.0
    yspace:
      type: linear
      N: 271
      start: -27.0
      end : 27.0
    projection :
      type: rotated_lonlat
      north_pole: [190, 39]
    y_numbering: -1
  partitioner: checkerboard
  halo: 1
  levels are top down: true
  groups:
  - variables: *chemvars  
    levels: 5
    vertical coordinate:
      profile: *levs
  - variables:
    - air_pressure
    levels: 5
    vertical coordinate:
      profile: *levs
  alias:
  - in code: ozone
    in file: O3
  - in code: carbon_monoxyde
    in file: CO
  - in code: nitrogen_dioxide
    in file: NO2
  - in code: sulfur_dioxide
    in file: SO2
  - in code: pm10
    in file: dry_pm10_mass
  - in code: pm2p5
    in file: dry_pm2p5_mass
  - in code: air_pressure
    in file: mid_layer_pressure
  io:
    total number of levels: 24
    initial date: 2022-06-30T12:00:00Z
    final date: 2022-07-02T00:00:00Z
state:
  date: 2022-07-01T12:00:00Z
  filepath: testdata/006/REDUCED_MONARCH_d01_2022063012.nc
  format: bsc
  state variables: *vars
observations:
  observers:
  - obs space:
      name: AIRBASE_PM10
      obsdatain:
        engine:
          type: H5File
          obsfile: testdata/HDAT_AIRBASE_PM10-2022070112.nc
      obsdataout:
        engine:
          type: H5File
          obsfile: testdata/HOUT_air_pressure-2022070112.nc
      simulated variables: [particulatematter10Surface]
    obs operator:
      name: VertInterp
      vertical coordinate: air_pressure
      observation vertical coordinate: air_pressure
      observation vertical coordinate group: MetaData
      interpolation method: nearest-neighbor
      observation alias file: testinput/monarch_ufo_variable_name_map.yaml

test:
  reference filename: testref/monarch_hofx3d_air_pressure.ref
  test output filename: testdata/monarch_hofx3d_air_pressure.log
