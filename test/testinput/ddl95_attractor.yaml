geometry:
  function space: StructuredColumns
  grid:
    type : regional
    nx: 64
    ny: 32
    dx: 10e3
    dy: 10e3
    lonlat(centre): [4.0,50.0]
    projection:
      type: lambert_conformal_conic
      longitude0: 4.0
      latitude0: 50.0
  groups:
  - variables:
    - air_temperature
    levels: 3
  halo: 2
initial condition:
  date: 2009-12-30T06:00:00Z
  state variables:
  - air_temperature
  random sigma: 4.0
model:
  name: DDL95
  time step: PT1H
forecast length: P2D
output:
  filepath: testdata/ddl95_attractor___RANGE__
  range pattern: __RANGE__
  frequency: P2D
prints:
  frequency: P2D
test:
  reference filename: testref/ddl95_attractor.ref
