_variables: &vars
    - ozone
    - carbon_monoxyde
    - nitrogen_dioxide
    - sulfur_dioxide
    - pm10
    - pm2p5
_chemVariables: &chemvars
    - ozone
    - carbon_monoxyde
    - nitrogen_dioxide
    - sulfur_dioxide
    - pm10
    - pm2p5
_levels: 
    profile: &levs [43, 44, 45, 46, 47]
_scalingGas: &scalegas
    scaling factor: 1.e-6

geometry:
  function space: StructuredColumns
  grid:
    type: structured
    xspace:
      type: linear
      N : 512
      start : -180.0
      end :  180.0
      endpoint: false
    yspace:
      type: linear
      N: 361
      start: -90.0
      end : 90.0
  partitioner: checkerboard
  halo: 1
  levels are top down: true
  groups:
  - variables: *chemvars  
    levels: 5
    vertical coordinate:
      profile: *levs
  alias:
  - in code: ozone
    in file: O3
    <<: *scalegas
  - in code: carbon_monoxyde
    in file: CO
    <<: *scalegas
  - in code: nitrogen_dioxide
    in file: NO2
    <<: *scalegas
  - in code: sulfur_dioxide
    in file: SO2
    <<: *scalegas
  - in code: pm10
    in file: dry_pm10_mass
  - in code: pm2p5
    in file: dry_pm2p5_mass
  io:
    total number of levels: 48
    initial date: 2017-12-16T12:00:00Z
    final date: 2017-12-18T00:00:00Z
    time step: 10800

background error:
  covariance model: ensemble
  members from template:
    template:
      date: 2017-12-17T00:00:00Z
      filepath: testdata/G%mem%/REDUCED_MONARCH_d01_2017121612.nc
      format: bsc
      state variables: *chemvars
    pattern: %mem%
    zero padding: 3
    start: 0
    nmembers: 6
  localization:
    localization method: SABER
    saber central block:
      saber block name: BUMP_NICAS
      calibration:
        nicas:
          resolution: 5.0
          explicit length-scales: true
          horizontal length-scale:
          - groups: [common]
            value: &common_length_scale 1000.0e3
          vertical length-scale:
          - groups: [common]
            value: 3.0
          default off-diagonal weight: 0.5
          specific off-diagonal weights:
          - variables pair: [ozone, carbon_monoxyde]
            weight: 0.2
        general:
          deprecated hull: false
          universe length-scale: *common_length_scale
        drivers:
          multivariate strategy: duplicated and weighted
          compute nicas: true

dirac:
  date: 2017-12-17T00:00:00Z
  lon:                 [            179.9,   17.9]
  lat:                 [             38.3,   60.3]
  vertical coordinate: [               47,     47]
  variable:            ['carbon_monoxyde', 'pm10']

background:
  date: 2017-12-17T00:00:00Z
  filepath: testdata/G006/REDUCED_MONARCH_d01_2017121612.nc
  format: bsc
  state variables: *chemvars

  
output dirac:
  filepath: testdata/monglob_D3reg_%id%.nc
  formats: [bsc]
  date: 2017-12-17T00:00:00Z

test:
  reference filename: testref/monglob_dirac_3d.ref
  test output filename: testdata/monglob_dirac_3d.log
