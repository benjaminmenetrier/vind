geometry:
  function space: StructuredColumns
  grid:
    type : zonal_band
    nx : 64
    ny : 32
    north : 70
    south : 30
  groups:
  - variables:
    - air_temperature
    levels: 3
initial condition:
  date: 2010-01-01T06:00:00Z
  state variables:
  - air_temperature
  filepath: testdata/pyddl95_attractor_P2D
model:
  name: python
  python module: ModelPythonDDL95
  time step: PT1H
forecast length: PT12H
output:
  filepath: testdata/pyddl95_truth___RANGE__
  range pattern: __RANGE__
  frequency: PT3H
prints:
  frequency: PT3H
test:
  reference filename: testref/pyddl95_truth.ref
