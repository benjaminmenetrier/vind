geometry:
  function space: StructuredColumns
  grid:
    type : regional
    nx: 64
    ny: 32
    dx: 10e3
    dy: 10e3
    lonlat(centre): [4.0,50.0]
    projection:
      type: lambert_conformal_conic
      longitude0: 4.0
      latitude0: 50.0
  groups:
  - variables:
    - air_temperature
    levels: 3
  halo: 2
initial condition:
  date: 2010-01-01T06:00:00Z
  state variables:
  - air_temperature
  filepath: testdata/ddl95_attractor_P2D
model:
  name: DDL95
  time step: PT1H
forecast length: PT12H
output:
  filepath: testdata/ddl95_truth___RANGE__
  range pattern: __RANGE__
  frequency: PT3H
prints:
  frequency: PT3H
test:
  reference filename: testref/ddl95_truth.ref
