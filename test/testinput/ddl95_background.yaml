geometry:
  function space: StructuredColumns
  grid:
    type : regional
    nx: 64
    ny: 32
    dx: 10e3
    dy: 10e3
    lonlat(centre): [4.0,50.0]
    projection:
      type: lambert_conformal_conic
      longitude0: 4.0
      latitude0: 50.0
  groups:
  - variables:
    - air_temperature
    levels: 3
  halo: 2
background:
  states:
  - date: 2010-01-01T06:00:00Z
    state variables:
    - air_temperature
    filepath: testdata/ddl95_truth_PT0S
  - date: 2010-01-01T09:00:00Z
    state variables:
    - air_temperature
    filepath: testdata/ddl95_truth_PT3H
  - date: 2010-01-01T12:00:00Z
    state variables:
    - air_temperature
    filepath: testdata/ddl95_truth_PT6H
  - date: 2010-01-01T15:00:00Z
    state variables:
    - air_temperature
    filepath: testdata/ddl95_truth_PT9H
  - date: 2010-01-01T18:00:00Z
    state variables:
    - air_temperature
    filepath: testdata/ddl95_truth_PT12H
background error:
  covariance model: SABER
  saber central block:
    saber block name: BUMP_NICAS
    calibration:
      general:
        default seed: 6
      drivers:
        multivariate strategy: univariate
        compute nicas: true
      nicas:
        resolution: 4.0
        explicit length-scales: true
        horizontal length-scale:
        - groups:
          - air_temperature
          value: 1.0e6
        vertical length-scale:
        - groups:
          - air_temperature
          value: 3.0
  saber outer blocks:
  - saber block name: StdDev
    read:
      model file:
        filepath: testdata/ddl95_stddev
  randomization size: 1
output states:
  states:
  - date: 2010-01-01T06:00:00Z
    filepath: testdata/ddl95_bkg_PT0S
  - date: 2010-01-01T09:00:00Z
    filepath: testdata/ddl95_bkg_PT3H
  - date: 2010-01-01T12:00:00Z
    filepath: testdata/ddl95_bkg_PT6H
  - date: 2010-01-01T15:00:00Z
    filepath: testdata/ddl95_bkg_PT9H
  - date: 2010-01-01T18:00:00Z
    filepath: testdata/ddl95_bkg_PT12H
test:
  reference filename: testref/ddl95_background.ref

