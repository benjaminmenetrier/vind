geometry:
  function space: StructuredColumns
  grid:
    type: regular_lonlat
    N: 10
  groups:
  - variables: [air_temperature]
    levels: 2
  halo: 2
background:
  states:
  - date: 2010-01-01T00:00:00Z
    state variables: [air_temperature]
    filepath: testdata/truth_PT0S
  - date: 2010-01-01T03:00:00Z
    state variables: [air_temperature]
    filepath: testdata/truth_PT3H
  - date: 2010-01-01T06:00:00Z
    state variables: [air_temperature]
    filepath: testdata/truth_PT6H
background error:
  covariance model: SABER
  saber central block:
    saber block name: BUMP_NICAS
    calibration:
      drivers:
        multivariate strategy: univariate
        compute nicas: true
      nicas:
        resolution: 4.0
        explicit length-scales: true
        horizontal length-scale:
        - groups: [air_temperature]
          value: 4.0e6
        vertical length-scale:
        - groups: [air_temperature]
          value: 3.0
  saber outer blocks:
  - saber block name: StdDev
    read:
      model file:
        filepath: testdata/stddev
  randomization size: 1
output states:
  states:
  - date: 2010-01-01T00:00:00Z
    filepath: testdata/bkg_PT0S
  - date: 2010-01-01T03:00:00Z
    filepath: testdata/bkg_PT3H
  - date: 2010-01-01T06:00:00Z
    filepath: testdata/bkg_PT6H
test:
  reference filename: testref/background.ref
