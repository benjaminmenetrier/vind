_variables: &vars
    - ozone
    - carbon_monoxide
    - nitrogen_dioxide
    - sulfur_dioxide
    - pm10
    - pm2p5
_chemVariables: &chemvars
    - ozone
    - carbon_monoxide
    - nitrogen_dioxide
    - sulfur_dioxide
    - pm10
    - pm2p5

# Mnemonics:
_memo:
  - &state_ref
    date: 2022-07-01T00:00:00Z
    filepath: testdata/forecast/MONARCH_2022070100.nc
    format: aq
    state variables: *chemvars
  - &member_ref
    date: 2022-07-01T00:00:00Z
    filepath: testdata/E%mem%/MONARCH_2022070100_E%mem%.nc
    format: aq
    state variables: *chemvars
  - &out_ref
    date: 2022-07-01T00:00:00Z
    filepath: testdata/D4reg_no_loc_2022070100.nc
    formats: [aq]

geometry:
  function space: StructuredColumns
  partitioner: "checkerboard"
  grid:
    type: regional
    dx: 0.1
    dy: 0.1
    nx: 720
    ny: 440
    xmin: -25.95
    ymin: 28.05
  levels are top down: true
  groups:
  - variables: *chemvars
    levels: 5
    vertical coordinate:
      profile: [19, 20, 21, 22, 23]
  alias:
  - in code: ozone
    in file: O3
  - in code: carbon_monoxide
    in file: CO
  - in code: nitrogen_dioxide
    in file: NO2
  - in code: sulfur_dioxide
    in file: SO2
  - in code: pm10
    in file: dry_pm10_mass
  - in code: pm2p5
    in file: dry_pm2p5_mass
  io:
    initial date: 2022-06-30T12:00:00Z

background error:
  covariance model: ensemble
  members from template:
    template:
      states:
        - <<: *member_ref
          date: 2022-07-01T00:00:00Z
          filepath: testdata/E%mem%/MONARCH_2022070100_E%mem%.nc
        - <<: *member_ref
          date: 2022-07-01T01:00:00Z
          filepath: testdata/E%mem%/MONARCH_2022070101_E%mem%.nc
        - <<: *member_ref
          date: 2022-07-01T02:00:00Z
          filepath: testdata/E%mem%/MONARCH_2022070102_E%mem%.nc
        - <<: *member_ref
          date: 2022-07-01T03:00:00Z
          filepath: testdata/E%mem%/MONARCH_2022070103_E%mem%.nc
        - <<: *member_ref
          date: 2022-07-01T04:00:00Z
          filepath: testdata/E%mem%/MONARCH_2022070104_E%mem%.nc
        - <<: *member_ref
          date: 2022-07-01T05:00:00Z
          filepath: testdata/E%mem%/MONARCH_2022070105_E%mem%.nc
    pattern: %mem%
    zero padding: 4
    start: 0
    nmembers: 6

dirac:
  - {}
  - date: 2022-07-01T01:00:00Z
    lon:                 [ -10.0]
    lat:                 [  60.0]
    vertical coordinate: [    23]
    variable:            ['ozone']
  - {}
  - {}
  - date: 2022-07-01T04:00:00Z
    lon:                 [  7.91]
    lat:                 [  38.3]
    vertical coordinate: [    23]
    variable:            ['carbon_monoxide']
  - {}

background:
  states:
    - <<: *state_ref
      date: 2022-07-01T00:00:00Z
      filepath: testdata/forecast/MONARCH_2022070100.nc
    - <<: *state_ref
      date: 2022-07-01T01:00:00Z
      filepath: testdata/forecast/MONARCH_2022070101.nc
    - <<: *state_ref
      date: 2022-07-01T02:00:00Z
      filepath: testdata/forecast/MONARCH_2022070102.nc
    - <<: *state_ref
      date: 2022-07-01T03:00:00Z
      filepath: testdata/forecast/MONARCH_2022070103.nc
    - <<: *state_ref
      date: 2022-07-01T04:00:00Z
      filepath: testdata/forecast/MONARCH_2022070104.nc
    - <<: *state_ref
      date: 2022-07-01T05:00:00Z
      filepath: testdata/forecast/MONARCH_2022070105.nc

  
output dirac:
  states:
    - <<: *out_ref
      date: 2022-07-01T00:00:00Z
      filepath: testdata/D4reg_no_loc_2022070100.nc
    - <<: *out_ref
      date: 2022-07-01T01:00:00Z
      filepath: testdata/D4reg_no_loc_2022070101.nc
    - <<: *out_ref
      date: 2022-07-01T02:00:00Z
      filepath: testdata/D4reg_no_loc_2022070102.nc
    - <<: *out_ref
      date: 2022-07-01T03:00:00Z
      filepath: testdata/D4reg_no_loc_2022070103.nc
    - <<: *out_ref
      date: 2022-07-01T04:00:00Z
      filepath: testdata/D4reg_no_loc_2022070104.nc
    - <<: *out_ref
      date: 2022-07-01T05:00:00Z
      filepath: testdata/D4reg_no_loc_2022070105.nc

test:
  reference filename: testref/dirac_no_loc_4d.ref
  test output filename: testdata/dirac_no_loc_4d.log
  float absolute tolerance: 1.e-15
