_variables: &vars
    - ozone
    - carbon_monoxide
    - nitrogen_dioxide
    - sulfur_dioxide
    - pm10
    - pm2p5

geometry:
  function space: StructuredColumns
  grid:
    type: regional
    dx: 0.1
    dy: 0.1
    nx: 720
    ny: 440
    xmin: -25.95
    ymin: 28.05
  partitioner: "checkerboard"
  halo: 1
  levels are top down: true
  groups:
  - variables: *vars
    levels: 5
    vertical coordinate:
      profile: [19, 20, 21, 22, 23]
  alias:
  - in code: ozone
    in file: O3
  - in code: carbon_monoxide
    in file: CO
  - in code: nitrogen_dioxide
    in file: NO2
  - in code: sulfur_dioxide
    in file: SO2
  - in code: pm10
    in file: dry_pm10_mass
  - in code: pm2p5
    in file: dry_pm2p5_mass
  io:
    initial date: 2022-06-30T12:00:00Z

state test:
  statefile:
    date: 2022-07-01T00:00:00Z
    filepath: testdata/forecast/MONARCH_2022070100.nc
    format: aq
    state variables: *vars
  write then read test:
    state write:
      date: 2022-07-01T00:00:00Z
      filepath: testdata/state_out.nc
      formats: [aq]
      state variables: *vars
    state read:
      date: 2022-07-01T00:00:00Z
      filepath: testdata/state_out.nc
      format: aq
      state variables: *vars
  date: 2022-07-01T00:00:00Z
  norm file: 0.00015096659780621801
  tolerance: 2.0e-08
  test variable change constructor: false

test:
  reference filename: testref/state.ref
