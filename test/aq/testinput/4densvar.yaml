_variables: &vars
    - ozone
    - carbon_monoxide
    - nitrogen_dioxide
    - sulfur_dioxide
    - pm10
    - pm2p5
_chemVariables: &chemvars
    - ozone
    - carbon_monoxide
    - nitrogen_dioxide
    - sulfur_dioxide
    - pm10
    - pm2p5
_o3_ObsErrFactor:
    total coefficient: &o3_obserr_factor 0.2
_o3_BkgBheckQCFactor:
    threshold: &o3_bkgcheckQC_factor 3.0
_o3_ObsErrMin:
    error parameter: &o3_obserr_min 5.e-10
_o3_ObsErrCheckMax:
    absolute threshold: &o3_obserr_checkmax 5.0e-6
# Mnemonics:
_memo:
  - &state_ref
    date: 2022-07-01T00:00:00Z
    filepath: testdata/forecast/MONARCH_2022070100.nc
    format: aq
    state variables: *chemvars
  - &member_ref
    date: 2022-07-01T00:00:00Z
    filepath: testdata/E%mem%/MONARCH_2022070100_E%mem%.nc
    format: aq
    state variables: *chemvars
  - &incr_ref
    date: 2022-07-01T00:00:00Z
    filepath: testdata/4densvar_incr_2022070100.nc
    formats: [aq]
    state variables: *chemvars
  - &out_ref
    date: 2022-07-01T00:00:00Z
    filepath: testdata/4densvar_analysis_2022070100.nc
    formats: [aq]
    state variables: *chemvars

cost function:
  cost type: 4D-Ens-Var
  time window:
    begin: 2022-07-01T09:00:00Z
    length: PT5H
    bound to include: end
  subwindow: PT1H
  analysis variables: *chemvars
  jb evaluation: false
  geometry: &geom
    function space: StructuredColumns
    grid:
      type: regional
      dx: 0.1
      dy: 0.1
      nx: 720
      ny: 440
      xmin: -25.95
      ymin: 28.05
    partitioner: "checkerboard"
    halo: 1
    levels are top down: true
    levels count from: 0
    groups:
    - variables: *chemvars
      levels: 5
      vertical coordinate:
        profile: [19, 20, 21, 22, 23]
    alias:
    - in code: ozone
      in file: O3
    - in code: carbon_monoxide
      in file: CO
    - in code: nitrogen_dioxide
      in file: NO2
    - in code: sulfur_dioxide
      in file: SO2
    - in code: pm10
      in file: dry_pm10_mass
    - in code: pm2p5
      in file: dry_pm2p5_mass
    io:
      initial date: 2022-06-30T12:00:00Z
  background:
    states:
      - <<: *state_ref
        date: 2022-07-01T09:00:00Z
        filepath: testdata/forecast/MONARCH_2022070109.nc
      - <<: *state_ref
        date: 2022-07-01T10:00:00Z
        filepath: testdata/forecast/MONARCH_2022070110.nc
      - <<: *state_ref
        date: 2022-07-01T11:00:00Z
        filepath: testdata/forecast/MONARCH_2022070111.nc
      - <<: *state_ref
        date: 2022-07-01T12:00:00Z
        filepath: testdata/forecast/MONARCH_2022070112.nc
      - <<: *state_ref
        date: 2022-07-01T13:00:00Z
        filepath: testdata/forecast/MONARCH_2022070113.nc
      - <<: *state_ref
        date: 2022-07-01T14:00:00Z
        filepath: testdata/forecast/MONARCH_2022070114.nc
  background error:
    covariance model: ensemble
    members from template:
      template:
        states:
          - <<: *member_ref
            date: 2022-07-01T09:00:00Z
            filepath: testdata/E%mem%/MONARCH_2022070109_E%mem%.nc
          - <<: *member_ref
            date: 2022-07-01T10:00:00Z
            filepath: testdata/E%mem%/MONARCH_2022070110_E%mem%.nc
          - <<: *member_ref
            date: 2022-07-01T11:00:00Z
            filepath: testdata/E%mem%/MONARCH_2022070111_E%mem%.nc
          - <<: *member_ref
            date: 2022-07-01T12:00:00Z
            filepath: testdata/E%mem%/MONARCH_2022070112_E%mem%.nc
          - <<: *member_ref
            date: 2022-07-01T13:00:00Z
            filepath: testdata/E%mem%/MONARCH_2022070113_E%mem%.nc
          - <<: *member_ref
            date: 2022-07-01T14:00:00Z
            filepath: testdata/E%mem%/MONARCH_2022070114_E%mem%.nc
      pattern: %mem%
      zero padding: 4
      start: 0
      nmembers: 6
    localization:
      localization method: SABER
      time decay: PT3H
      saber central block:
        saber block name: BUMP_NICAS
        read:
          nicas:
            resolution: 5.0
            explicit length-scales: true
            horizontal length-scale:
              - groups: [common]
                value: &common_length_scale 200.0e3
            vertical length-scale:
              - groups: [common]
                value: 3.0
            common localization weights:
              - row variables: *chemvars
                column variables: *chemvars
                value: 0.5
            default off-diagonal weight: 0.5
            specific off-diagonal weights:
            - variables pair: [ozone, carbon_monoxide]
              weight: 0.2
          general:
            deprecated hull: false
            universe length-scale: *common_length_scale
          drivers:
            multivariate strategy: duplicated and weighted
            read local nicas: true
          io:
            data directory: testdata
            files prefix: nicas_4d
            io tasks: 2
  observations:
    observers:
    - obs space:
        name: AIRBASE_O3
        obsdatain:
          engine:
            type: H5File
            obsfile: testdata/HDAT_AIRBASE_O3-2022070112.nc
        obsdataout:
          engine:
            type: H5File
            obsfile: testdata/HOUT_aq4D_AIRBASE_O3-2022070112.nc
        simulated variables: [ozoneSurface]
      obs filters:
        - filter: Variable Assignment
          assignments:
          - name: DerivedObsError/ozoneSurface
            type: float
            function:
              name: ObsFunction/Arithmetic
              options:
                variables:
                - name: ObsValue/ozoneSurface
                absolute value: [true]
                total coefficient: *o3_obserr_factor
        - filter: Perform Action
          filter variables:
          - name: ozoneSurface
          action:
            name: assign error
            error function:
              name: ObsFunction/Arithmetic
              options:
                variables:
                - name: DerivedObsError/ozoneSurface
          where:
            - variable:
                name: DerivedObsError/ozoneSurface
              minvalue: *o3_obserr_min
        - filter: Perform Action
          filter variables:
          - name: ozoneSurface
          action:
            name: assign error
            error parameter: *o3_obserr_min
          where:
            - variable:
                name: DerivedObsError/ozoneSurface
              maxvalue: *o3_obserr_min
        - filter: Background Check
          filter variables:
          - name: ozoneSurface
          threshold: *o3_bkgcheckQC_factor
          absolute threshold: *o3_obserr_checkmax
      obs operator:
        name: VertInterp
        constant vertical coordinate values: [0, 0, 0, 0, 1]
        observation vertical coordinate: air_pressure
        interpolation method: nearest-neighbor
        observation alias file: testinput/ufo_variable_name_map.yaml
      obs error:
        covariance model: diagonal
variational:
  minimizer:
    algorithm: RPLanczos
  iterations:
  - diagnostics:
      departures: ombg0
    gradient norm reduction: 1.0e-10
    ninner: 20
    geometry: *geom
final:
  diagnostics:
    departures: oman
  increment:
    geometry: *geom
    output:
      state component:
        states:
          - <<: *incr_ref
            date: 2022-07-01T09:00:00Z
            filepath: testdata/4densvar_incr_2022070109.nc
          - <<: *incr_ref
            date: 2022-07-01T10:00:00Z
            filepath: testdata/4densvar_incr_2022070110.nc
          - <<: *incr_ref
            date: 2022-07-01T11:00:00Z
            filepath: testdata/4densvar_incr_2022070111.nc
          - <<: *incr_ref
            date: 2022-07-01T12:00:00Z
            filepath: testdata/4densvar_incr_2022070112.nc
          - <<: *incr_ref
            date: 2022-07-01T13:00:00Z
            filepath: testdata/4densvar_incr_2022070113.nc
          - <<: *incr_ref
            date: 2022-07-01T14:00:00Z
            filepath: testdata/4densvar_incr_2022070114.nc
        
output:
  states:
    - <<: *out_ref
      date: 2022-07-01T09:00:00Z
      filepath: testdata/4densvar_analysis_2022070109.nc
    - <<: *out_ref
      date: 2022-07-01T10:00:00Z
      filepath: testdata/4densvar_analysis_2022070110.nc
    - <<: *out_ref
      date: 2022-07-01T11:00:00Z
      filepath: testdata/4densvar_analysis_2022070111.nc
    - <<: *out_ref
      date: 2022-07-01T12:00:00Z
      filepath: testdata/4densvar_analysis_2022070112.nc
    - <<: *out_ref
      date: 2022-07-01T13:00:00Z
      filepath: testdata/4densvar_analysis_2022070113.nc
    - <<: *out_ref
      date: 2022-07-01T14:00:00Z
      filepath: testdata/4densvar_analysis_2022070114.nc

test:
  reference filename: testref/4densvar.ref
  test output filename: testdata/4densvar.log
  float absolute tolerance: 1.e-15
    

